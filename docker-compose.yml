services:
  # Contenedor para el Frontend (React + Vite)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true 
      - VITE_API_URL=http://localhost:8000/api
      - VITE_STORAGE_KEY=---
    restart: always
    networks:
      - prolecom_network
    depends_on:
      backend:
        condition: service_started

  # Contenedor para el Backend (PHP + Apache)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    ports:
      - "8000:80"
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=prolecom
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
    restart: always
    networks:
      - prolecom_network
    depends_on:
      db:
        condition: service_healthy

  # Contenedor para la Base de Datos (MySQL)
  db:
    image: mysql:8.0
    ports:
      - "3307:3306" 
    environment:
      MYSQL_DATABASE: prolecom
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - db_data:/var/lib/mysql
      - ./backend/scripts:/docker-entrypoint-initdb.d
    restart: always
    networks:
      - prolecom_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Herramienta de gestión de base de datos
  adminer:
    image: adminer
    restart: always
    ports:
      - "8080:8080"
    networks:
      - prolecom_network

  # Procesador de colas en segundo plano para calificar retos
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    volumes:
      - ./backend:/var/www/html
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=prolecom
      - DB_USERNAME=root
      - DB_PASSWORD=root
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
    command: php artisan queue:work --verbose --tries=3 --timeout=90
    restart: always
    networks:
      - prolecom_network
    depends_on:
      db:
        condition: service_healthy

networks:
  prolecom_network:
    driver: bridge

volumes:
  db_data:

 