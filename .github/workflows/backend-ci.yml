name: Backend CI

on:
  push:
    branches: [ "master", "dev" ]
  pull_request:
    branches: [ "master", "dev" ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
    - uses: actions/checkout@v4

    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: '8.4'
        extensions: mbstring, pdo, pdo_mysql, openssl
        coverage: xdebug

    - name: Copy .env
      run: php -r "file_exists('.env') || copy('.env.example', '.env');"

    - name: Install dependencies
      run: composer install --no-interaction --prefer-dist

    - name: Check code style (Pint)
      run: ./vendor/bin/pint --test

    - name: Static analysis (PHPStan)
      run: composer analyse

    - name: Prepare coverage directory
      run: mkdir -p build/logs

    - name: Run tests with coverage
      run: php artisan config:clear && php -d xdebug.mode=coverage vendor/bin/phpunit --coverage-clover build/logs/clover.xml

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: clover-coverage
        path: backend/build/logs/clover.xml
        if-no-files-found: warn
